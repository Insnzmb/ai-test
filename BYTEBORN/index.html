<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BYTEBORN</title>
<style>
:root{--c:#48e5ff;--b:#4a7dff;--p:#a05cff;--t:#eaf7ff;--m:#8faec8}*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Segoe UI,Arial,sans-serif;background:#06111f;color:var(--t);overflow:hidden}body{background:radial-gradient(circle at 20% 10%,#183b55 0,transparent 34%),radial-gradient(circle at 85% 80%,#321d57 0,transparent 35%),linear-gradient(#06111f,#0a1730)}#app{max-width:520px;height:100%;margin:auto;display:grid;grid-template-rows:auto 1fr auto;border-inline:1px solid #ffffff12;box-shadow:0 0 60px #0008}.top{display:flex;justify-content:space-between;align-items:center;padding:15px 16px;z-index:2}.logo{font-weight:900;letter-spacing:.2em}.sub{font-size:11px;color:var(--m);margin-top:3px}.badge{font-size:11px;color:var(--c);border:1px solid #48e5ff55;background:#48e5ff12;padding:7px 10px;border-radius:999px}.scene{position:relative;overflow:hidden}.scene:before{content:"";position:absolute;inset:0;background-image:linear-gradient(#48e5ff12 1px,transparent 1px),linear-gradient(90deg,#48e5ff12 1px,transparent 1px);background-size:34px 34px;opacity:.35;transform:perspective(600px) rotateX(62deg) translateY(150px) scale(1.6);animation:grid 9s linear infinite}@keyframes grid{to{background-position:0 34px}}canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}.zone{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px}.name{font-size:23px;font-weight:900;text-shadow:0 0 18px #48e5ff77}.lv{font-size:12px;color:#ffd76e;margin:5px 0 7px}.speech{font-size:13px;color:#d8ecff;text-align:center;min-height:38px;max-width:370px}.stage{width:240px;height:240px;display:grid;place-items:center;position:relative;cursor:pointer}.shadow{position:absolute;bottom:32px;width:130px;height:25px;background:#0007;border-radius:50%;filter:blur(7px)}.egg{width:116px;height:150px;border-radius:50% 50% 46% 46%/58% 58% 42% 42%;background:radial-gradient(circle at 35% 20%,#fff,transparent 16%),linear-gradient(145deg,#d9fbff,#6edcff 43%,#6876ff 72%,#a45cff);box-shadow:0 0 38px #48e5ff88,inset 0 -18px 30px #26266455;animation:wob 2s ease-in-out infinite;position:relative}.egg:after{content:"";position:absolute;inset:40px 49px 42px;background:#07152a;clip-path:polygon(45% 0,100% 19%,45% 35%,100% 51%,35% 67%,80% 82%,0 100%,27% 69%,0 56%,43% 40%,0 24%);opacity:0}.egg.crack:after{opacity:1;filter:drop-shadow(0 0 7px white)}@keyframes wob{50%{transform:translateY(-8px) rotate(3deg)}}.pet{width:150px;height:150px;position:relative;animation:idle 2.4s ease-in-out infinite}.pet.happy{animation:bounce .55s ease 2}.pet.sleep{animation:sleep 3.6s ease-in-out infinite;filter:saturate(.6) brightness(.75)}@keyframes idle{50%{transform:translateY(-10px) scale(1.02,.98)}}@keyframes bounce{35%{transform:translateY(-29px) rotate(-7deg) scale(1.06,.94)}70%{transform:translateY(-6px) rotate(6deg)}}@keyframes sleep{50%{transform:translateY(-4px) rotate(2deg)}}.body{position:absolute;inset:20px;border-radius:44% 44% 48% 48%;background:radial-gradient(circle at 35% 25%,#fff9,transparent 18%),linear-gradient(145deg,#60efff,#5477ff 56%,#9a5cff);box-shadow:inset 0 -14px 25px #15184b55,0 0 25px #48e5ff88,0 0 55px #4a7dff55}.ear{position:absolute;top:12px;width:45px;height:63px;background:linear-gradient(150deg,#66efff,#5d64ff);border-radius:70% 30% 60% 40%;z-index:-1}.ear.l{left:13px;transform:rotate(-26deg)}.ear.r{right:13px;transform:scaleX(-1) rotate(-26deg)}.eye{position:absolute;top:52px;width:27px;height:35px;border-radius:50%;background:#051326;overflow:hidden;transition:.1s}.eye.l{left:44px}.eye.r{right:44px}.eye.blink{transform:scaleY(.12)}.pupil{position:absolute;width:12px;height:17px;left:8px;top:8px;border-radius:50%;background:linear-gradient(#fff,#71f1ff);box-shadow:0 0 8px #71f1ff}.mouth{position:absolute;width:34px;height:16px;left:58px;top:95px;border-bottom:4px solid #08162c;border-radius:50%}.core{position:absolute;width:36px;height:36px;left:57px;bottom:22px;border-radius:12px;background:linear-gradient(135deg,#fff,#4ce1ff 55%,#775cff);box-shadow:0 0 18px #48e5ff;transform:rotate(45deg)}.panel{margin:0 12px 12px;padding:12px;border:1px solid #ffffff14;border-radius:18px;background:linear-gradient(#102642ed,#0b1a2eed);box-shadow:0 14px 36px #0005;backdrop-filter:blur(12px)}.stats{display:grid;grid-template-columns:1fr 1fr;gap:9px 12px}.head{display:flex;justify-content:space-between;font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}.bar{height:8px;background:#ffffff12;border-radius:99px;overflow:hidden}.fill{height:100%;border-radius:99px;transition:.3s}.hun{background:linear-gradient(90deg,#ff926c,#ffd76e)}.hap{background:linear-gradient(90deg,#ff71bd,#a05cff)}.ene{background:linear-gradient(90deg,#48e5ff,#4a7dff)}.xp{background:linear-gradient(90deg,#6effb1,#48e5ff)}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:11px}.small{display:flex;gap:8px;margin-top:8px}.small button{flex:1;color:var(--m);font-size:11px}button{border:1px solid #ffffff18;border-radius:13px;padding:10px 5px;background:#ffffff0f;color:var(--t);font-weight:800;cursor:pointer}button:hover{background:#48e5ff18;border-color:#48e5ff55;transform:translateY(-1px)}button:disabled{opacity:.4;cursor:not-allowed;transform:none}.trait{text-align:center;font-size:11px;color:var(--m);margin-top:9px}.flash{position:absolute;inset:0;background:white;opacity:0;pointer-events:none}.flash.go{animation:flash .7s ease-out}@keyframes flash{25%{opacity:.95}to{opacity:0}}@media(max-height:720px){.stage{height:185px}.pet{transform:scale(.85)}.panel{padding:9px}.speech{min-height:25px}}
</style>
</head>
<body>
<div id="app">
<header class="top"><div><div class="logo">BYTEBORN</div><div class="sub">Digital Familiar</div></div><div class="badge" id="badge">CORE DORMANT</div></header>
<main class="scene"><canvas id="fx"></canvas><div class="zone"><div class="name" id="name">Unknown Core</div><div class="lv" id="level">LV 1</div><div class="speech" id="speech">A strange digital egg is waiting for a signal.</div><div class="stage" id="stage"><div class="shadow"></div><div class="egg" id="egg"></div><div class="pet" id="pet" hidden><div class="ear l"></div><div class="ear r"></div><div class="body"></div><div class="eye l"><i class="pupil"></i></div><div class="eye r"><i class="pupil"></i></div><div class="mouth"></div><div class="core"></div></div></div></div><div class="flash" id="flash"></div></main>
<section class="panel"><div class="stats"><div><div class="head"><span>Hunger</span><b id="ht">70</b></div><div class="bar"><div class="fill hun" id="hb"></div></div></div><div><div class="head"><span>Happiness</span><b id="pt">70</b></div><div class="bar"><div class="fill hap" id="pb"></div></div></div><div><div class="head"><span>Energy</span><b id="et">80</b></div><div class="bar"><div class="fill ene" id="eb"></div></div></div><div><div class="head"><span>XP</span><b id="xt">0 / 100</b></div><div class="bar"><div class="fill xp" id="xb"></div></div></div></div><div class="actions"><button id="hatch">Hatch</button><button id="feed" disabled>Feed</button><button id="petb" disabled>Pet</button><button id="play" disabled>Play</button></div><div class="small"><button id="sleep" disabled>Sleep</button><button id="rename" disabled>Rename</button><button id="reset">Reset</button></div><div class="trait" id="trait">Personality seed: unformed</div></section>
</div>
<script>
(()=>{const K='byteborn-save-v2',q=s=>document.querySelector(s),S={hatched:false,name:'Unknown Core',level:1,xp:0,hunger:70,happy:70,energy:80,sleeping:false,traits:{affectionate:0,playful:0,adventurous:0,independent:0},last:Date.now()};const pet=q('#pet'),egg=q('#egg'),speech=q('#speech'),P=[];const clamp=n=>Math.max(0,Math.min(100,n));function save(){S.last=Date.now();localStorage.setItem(K,JSON.stringify(S))}function load(){try{const x=JSON.parse(localStorage.getItem(K));if(!x)return;Object.assign(S,x);const m=Math.min(480,(Date.now()-S.last)/60000);S.hunger=clamp(S.hunger-m*.32);S.happy=clamp(S.happy-m*.12);S.energy=clamp(S.energy+(S.sleeping?m*.7:-m*.18))}catch{}}function say(x){speech.textContent=x}function burst(n=25){const c=q('#fx').getBoundingClientRect();for(let i=0;i<n;i++)P.push({x:c.width/2,y:c.height*.55,vx:(Math.random()-.5)*4,vy:(Math.random()-.8)*4.5,l:50+Math.random()*40,s:1+Math.random()*3})}function bounce(){pet.classList.remove('happy');void pet.offsetWidth;pet.classList.add('happy')}function xp(n){S.xp+=n;const need=S.level*100;if(S.xp>=need){S.xp-=need;S.level++;q('#flash').classList.remove('go');void q('#flash').offsetWidth;q('#flash').classList.add('go');burst(60);say(`${S.name} reached level ${S.level}!`)}}function trait(){const a=Object.entries(S.traits).sort((x,y)=>y[1]-x[1]);return !S.hatched||a[0][1]<2?'Personality seed: still forming':`Dominant personality: ${a[0][0][0].toUpperCase()+a[0][0].slice(1)}`}function ui(){q('#name').textContent=S.name;q('#level').textContent=`LV ${S.level}`;[['hunger','h'],['happy','p'],['energy','e']].forEach(([k,i])=>{q('#'+i+'t').textContent=Math.round(S[k]);q('#'+i+'b').style.width=S[k]+'%'});const need=S.level*100;q('#xt').textContent=`${Math.round(S.xp)} / ${need}`;q('#xb').style.width=S.xp/need*100+'%';q('#trait').textContent=trait();egg.hidden=S.hatched;pet.hidden=!S.hatched;q('#hatch').disabled=S.hatched;['feed','petb','play'].forEach(i=>q('#'+i).disabled=!S.hatched||S.sleeping);q('#play').disabled||=(S.energy<12);q('#sleep').disabled=q('#rename').disabled=!S.hatched;q('#sleep').textContent=S.sleeping?'Wake Up':'Sleep';pet.classList.toggle('sleep',S.sleeping);q('#badge').textContent=!S.hatched?'CORE DORMANT':S.sleeping?'REST MODE':S.hunger<20?'LOW NUTRIENTS':S.energy<20?'LOW POWER':'CORE STABLE'}q('#hatch').onclick=()=>{egg.classList.add('crack');q('#hatch').disabled=true;say('The core is responding...');burst(18);setTimeout(()=>{S.hatched=true;S.name='Byte';S.happy=82;S.energy=88;xp(15);burst(70);say('A tiny digital familiar has emerged.');ui();save()},1400)};q('#feed').onclick=()=>{S.hunger=clamp(S.hunger+25);S.happy=clamp(S.happy+4);S.traits.affectionate+=.5;xp(8);bounce();burst(18);say(`${S.name} devours a glowing data-fruit.`);ui();save()};q('#petb').onclick=()=>{S.happy=clamp(S.happy+18);S.traits.affectionate+=1.5;xp(6);bounce();burst(14);say(`${S.name} emits a happy synthesized purr.`);ui();save()};q('#play').onclick=()=>{S.energy=clamp(S.energy-14);S.hunger=clamp(S.hunger-5);S.happy=clamp(S.happy+22);S.traits.playful+=1.5;S.traits.adventurous+=.5;xp(14);bounce();burst(34);say(`${S.name} chases a swarm of rogue pixels.`);ui();save()};q('#sleep').onclick=()=>{S.sleeping=!S.sleeping;say(S.sleeping?`${S.name} curls around its core.`:`${S.name} wakes up.`);ui();save()};q('#rename').onclick=()=>{const n=prompt('Name your familiar:',S.name);if(n&&n.trim()){S.name=n.trim().slice(0,18);say(`${S.name} recognizes its new name.`);ui();save()}};q('#reset').onclick=()=>{if(confirm('Erase this familiar and restart?')){localStorage.removeItem(K);location.reload()}};q('#stage').onclick=()=>{if(!S.hatched||S.sleeping)return;S.happy=clamp(S.happy+2);S.traits.affectionate+=.2;bounce();burst(8);const a=[`${S.name} scans the room for bugs.`,`${S.name} found one suspicious semicolon.`,`${S.name} wants more compute. Or snacks.`,`${S.name} is planning an expedition.`];say(a[Math.random()*a.length|0]);ui();save()};setInterval(()=>{if(!S.hatched)return;if(S.sleeping){S.energy=clamp(S.energy+1.2);S.hunger=clamp(S.hunger-.18);if(S.energy>=100){S.sleeping=false;say(`${S.name} wakes at full power.`)}}else{S.hunger=clamp(S.hunger-.34);S.energy=clamp(S.energy-.22);S.happy=clamp(S.happy-.12);if(S.hunger<15||S.energy<10)S.traits.independent+=.02}ui();save()},5000);document.addEventListener('mousemove',e=>{if(!S.hatched||S.sleeping)return;const r=pet.getBoundingClientRect(),dx=(e.clientX-r.left-r.width/2)/r.width,dy=(e.clientY-r.top-r.height/2)/r.height;document.querySelectorAll('.pupil').forEach(p=>p.style.transform=`translate(${Math.max(-4,Math.min(4,dx*8))}px,${Math.max(-3,Math.min(3,dy*6))}px)`) });setInterval(()=>{if(!S.hatched||S.sleeping)return;document.querySelectorAll('.eye').forEach(e=>e.classList.add('blink'));setTimeout(()=>document.querySelectorAll('.eye').forEach(e=>e.classList.remove('blink')),130)},3500);const c=q('#fx'),x=c.getContext('2d');function size(){const r=c.getBoundingClientRect(),d=devicePixelRatio||1;c.width=r.width*d;c.height=r.height*d;x.setTransform(d,0,0,d,0,0)}addEventListener('resize',size);size();(function draw(){const r=c.getBoundingClientRect();x.clearRect(0,0,r.width,r.height);if(Math.random()<.08)P.push({x:Math.random()*r.width,y:r.height+5,vx:(Math.random()-.5)*.4,vy:-.4-Math.random()*.6,l:130,s:1+Math.random()*2});for(let i=P.length-1;i>=0;i--){const p=P[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.015;p.l--;x.globalAlpha=Math.max(0,Math.min(1,p.l/60));x.fillStyle=Math.random()>.35?'#48e5ff':'#a05cff';x.beginPath();x.arc(p.x,p.y,p.s,0,7);x.fill();if(p.l<=0)P.splice(i,1)}x.globalAlpha=1;requestAnimationFrame(draw)})();load();if(S.hatched)say(S.sleeping?`${S.name} is sleeping.`:`${S.name} recognizes your return.`);ui()})();
</script>
</body>
</html>
